<style>
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes dieGlow {
  0%,100% { box-shadow: 0 0 6px 1px #c8963e22; }
  50%      { box-shadow: 0 0 18px 6px #c8963e88; }
}
@keyframes dieSettle {
  0%   { transform:rotate(45deg) scale(1.08); }
  60%  { transform:rotate(45deg) scale(0.95); }
  100% { transform:rotate(45deg) scale(1); }
}
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
@keyframes rollBtnPulse {
  0%,100% { box-shadow: 0 0 6px 1px #c8963e33; }
  50%      { box-shadow: 0 0 18px 6px #c8963e88; }
}
.fade-up  { animation: fadeUp 0.4s ease forwards; }
.fade-in  { animation: fadeIn 0.3s ease forwards; }
.die-glow { animation: dieGlow 0.5s ease-in-out infinite; }
.die-settle { animation: dieSettle 0.35s ease-out forwards; }
</style>

<style>
  #char-panel { width: 300px; transition: width 0.25s ease, opacity 0.25s ease, padding 0.25s ease; overflow: hidden; }
  #char-panel.collapsed { width: 0; opacity: 0; padding: 0; border: none; }
  #char-toggle { transition: background 0.2s; }
  #char-toggle:hover { background: #222 !important; }
</style>

<div style="display:flex;gap:16px;min-height:520px;align-items:stretch;">

  <!-- Main dialog panel -->
  <div style="flex:1;border:1px solid #333;border-radius:10px;background:#0a0a0a;overflow:hidden;display:flex;flex-direction:column;">
    <div style="background:#111;border-bottom:1px solid #1a1a1a;padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
      <div id="breadcrumb" style="font-size:11px;color:#444;">Act I › Chapter 2: The Road</div>
      <div style="display:flex;gap:10px;font-size:11px;color:#444;align-items:center;">
        <span>📜 Log</span>
        <span>💾 Save</span>
        <button id="char-toggle" onclick="toggleChar()" title="Character" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:3px 8px;cursor:pointer;font-size:13px;line-height:1;">🧙</button>
      </div>
    </div>
    <div id="interaction-area" style="padding:28px 32px;flex:1;"></div>
  </div>

  <!-- Character panel — collapsed by default -->
  <div id="char-panel" class="collapsed" style="border:1px solid #333;border-radius:10px;background:#141414;padding:14px;font-size:12px;flex-shrink:0;">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
      <div style="width:38px;height:38px;background:#1a1a2e;border:2px solid #6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;">🧙</div>
      <div><div style="color:white;font-weight:600;white-space:nowrap;">The Wanderer</div><div style="color:#555;font-size:10px;white-space:nowrap;">No memory. No name.</div></div>
    </div>
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;color:#666;margin-bottom:3px;"><span>HP</span><span id="hp-val" style="color:#ef4444;">72 / 100</span></div>
      <div style="background:#1e1e1e;border-radius:3px;height:5px;"><div id="hp-bar" style="background:#ef4444;width:72%;height:100%;border-radius:3px;transition:width 0.4s;"></div></div>
    </div>
    <div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;color:#666;margin-bottom:3px;"><span>Mana</span><span style="color:#6366f1;">45 / 60</span></div>
      <div style="background:#1e1e1e;border-radius:3px;height:5px;"><div style="background:#6366f1;width:75%;height:100%;border-radius:3px;"></div></div>
      <div style="display:flex;justify-content:space-between;color:#666;margin-top:6px;"><span>Gold</span><span style="color:#f59e0b;">🪙 34</span></div>
    </div>
    <div style="border-top:1px solid #222;padding-top:10px;margin-bottom:10px;">
      <div class="label" style="margin-bottom:6px;">Stats</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;text-align:center;">
        <div style="background:#1e1e1e;border-radius:3px;padding:4px;"><div style="color:#f59e0b;font-weight:700;">8</div><div style="color:#555;font-size:9px;">STR</div></div>
        <div style="background:#1e1e1e;border-radius:3px;padding:4px;"><div style="color:#6366f1;font-weight:700;">14</div><div style="color:#555;font-size:9px;">INT</div></div>
        <div style="background:#1e1e1e;border-radius:3px;padding:4px;"><div style="color:#10b981;font-weight:700;">11</div><div style="color:#555;font-size:9px;">CHA</div></div>
        <div style="background:#1e1e1e;border-radius:3px;padding:4px;"><div style="color:#ec4899;font-weight:700;">12</div><div style="color:#555;font-size:9px;">AGI</div></div>
        <div style="background:#1e1e1e;border-radius:3px;padding:4px;"><div style="color:#8b5cf6;font-weight:700;">9</div><div style="color:#555;font-size:9px;">WIS</div></div>
        <div style="background:#1e1e1e;border-radius:3px;padding:4px;"><div style="color:#ef4444;font-weight:700;">10</div><div style="color:#555;font-size:9px;">CON</div></div>
      </div>
    </div>
    <div style="border-top:1px solid #222;padding-top:10px;">
      <div class="label" style="margin-bottom:6px;">Inventory</div>
      <div style="display:flex;flex-direction:column;gap:3px;font-size:11px;">
        <div style="display:flex;justify-content:space-between;color:#aaa;white-space:nowrap;"><span>🗡 Worn Blade</span><span style="color:#555;">×1</span></div>
        <div style="display:flex;justify-content:space-between;color:#aaa;white-space:nowrap;"><span>🧪 Health Potion</span><span id="potion-count" style="color:#555;">×2</span></div>
        <div style="display:flex;justify-content:space-between;color:#aaa;white-space:nowrap;"><span>📜 Torn Map</span><span style="color:#555;">×1</span></div>
      </div>
    </div>
  </div>

</div>

<script>
const TYPE_CONFIG = {
  speak:       { color:'#64748b', badge:'Speak'               },
  action:      { color:'#a16207', badge:'Action'              },
  skill_check: { color:'#6366f1', badge:'Skill Check'         },
  combat:      { color:'#ef4444', badge:'Combat'              },
  shop:        { color:'#f59e0b', badge:'Shop'                },
  loot:        { color:'#10b981', badge:'Loot'                },
  rest:        { color:'#8b5cf6', badge:'Rest'                },
  examine:     { color:'#84cc16', badge:'Examine Surroundings'},
};

const INTERACTIONS = {
  start: {
    location: '📍 The Cracked Road',
    text: '"The road ends here." The figure doesn\'t move. Doesn\'t blink. The sword at their hip is old but clean — the kind of clean that means it\'s been used recently.\n\nYou count your options. The road stretches behind you. The figure fills what\'s ahead.',
    options: [
      { type:'speak',      label: 'Step forward slowly, hands visible', next: 'forward' },
      { type:'speak',      label: '"Who are you?"', next: 'ask' },
      { type:'skill_check', label: 'Try to slip past into the ravine', skill: { stat:'AGI', dc:12 }, successNext:'slipped', failText:'Your foot clips loose gravel. The figure turns, hand on the sword hilt. The ravine was never an option.' },
      { type:'combat',      label: 'Draw a weapon' },
    ]
  },
  forward: {
    location: '📍 The Cracked Road',
    text: 'You raise your hands and take one slow step. The figure watches you the way hawks watch mice — not with hunger, exactly. With patience.\n\n"Smart," they say at last. "Most people reach for steel."\n\nThey don\'t move. But the hand leaves the hilt.',
    options: [
      { type:'speak', label: '"Who are you?"', next: 'ask' },
      { type:'speak', label: '"What do you want?"', next: 'want' },
      { type:'speak', label: 'Stay silent and wait', next: 'wait' },
    ]
  },
  ask: {
    location: '📍 The Cracked Road',
    text: 'A long pause. The wind moves between you, carrying dust.\n\n"Nobody," they say. "Same as you."\n\nSomething in their voice suggests they mean it literally — not as deflection, but as fact. They study your face the way someone reads a sign in a language they half-remember.',
    options: [
      { type:'speak', label: '"How do you know I\'m nobody?"', next: 'know' },
      { type:'speak', label: '"What do you want from me?"', next: 'want' },
    ]
  },
  want: {
    location: '📍 The Cracked Road',
    text: '"To warn you," they say. "The road ahead is watched. Not by people like me — by something older. If you keep walking, you\'ll find it before nightfall."\n\nThey step aside. Just enough to let you pass.\n\n"Your choice."',
    options: [
      { type:'speak', label: 'Thank them and continue', next: 'continue' },
      { type:'speak', label: '"What is watching the road?"', next: 'whatwatches' },
      { type:'speak', label: 'Pass without a word', next: 'continue' },
    ]
  },
  slipped: {
    location: '📍 The Ravine Edge',
    text: 'You time it perfectly. One quick step left, weight low, and you\'re past them before they register the movement.\n\nBehind you, a sharp exhale — not anger. Surprise.\n\n"Hm."\n\nYou don\'t look back.',
    options: [
      { type:'speak', label: 'Keep moving', next: 'continue' },
    ]
  },
  know: {
    location: '📍 The Cracked Road',
    text: 'They tilt their head. "You came from the Wastelands. Alone. No pack, no water, no dust on your hands from digging." A pause. "People with a past carry it in how they walk. You don\'t."\n\nThey look almost sorry about it.',
    options: [
      { type:'speak', label: '"What does that mean?"', next: 'want' },
      { type:'speak', label: 'Say nothing', next: 'want' },
    ]
  },
  whatwatches: {
    location: '📍 The Cracked Road',
    text: 'They look at you a moment too long.\n\n"I don\'t have a name for it. Names are how you invite things closer." They pull their coat tighter. "Just — don\'t stop walking. Whatever you hear, don\'t stop."\n\nThey\'re already turning away.',
    options: [
      { type:'speak', label: 'Continue down the road', next: 'continue' },
    ]
  },
  wait: {
    location: '📍 The Cracked Road',
    text: 'You say nothing. Hold the silence back at them.\n\nThe figure blinks. Then, unexpectedly, almost smiles.\n\n"Good instincts." They step aside. "Most people talk when they\'re scared. Makes them easier to read."\n\nThe road is open.',
    options: [
      { type:'speak', label: 'Continue', next: 'continue' },
    ]
  },
  continue: {
    location: '📍 The Road North',
    text: 'The figure shrinks behind you.\n\nThe road stretches on, cracked and pale. The horizon offers nothing but more of the same — flat land, sick sky, and the distant smell of something burnt a long time ago.\n\nBut ahead, barely visible, a shape breaks the line of the world. Walls, maybe. Or ruins of them.',
    options: [
      { type:'action', label: 'Press on toward the shape', next: 'end' },
      { type:'rest',   label: 'Rest before continuing', next: 'end' },
    ]
  },
  end: { end: true }
};

let failedOptions = new Set();
let rollingOptionIdx = null;

function renderInteraction(key) {
  failedOptions = new Set();
  rollingOptionIdx = null;
  const d = INTERACTIONS[key];
  if (d.end) { renderEnd(); return; }
  const area = document.getElementById('interaction-area');
  area.innerHTML = `
    <div class="fade-up">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;">
        <span style="font-size:13px;color:#c8963e;font-weight:600;">${d.location}</span>
      </div>
      <p style="font-size:14px;line-height:1.9;color:#ccc;font-style:italic;margin-bottom:24px;white-space:pre-wrap;">${d.text}</p>
      <div style="height:1px;background:#1a1a1a;margin-bottom:18px;"></div>
      <div id="options" style="display:flex;flex-direction:column;gap:6px;font-size:13px;"></div>
    </div>`;
  renderOptions(d, key);
}

function renderOptions(d, key) {
  const container = document.getElementById('options');
  container.innerHTML = '';
  d.options.forEach((opt, i) => {
    const failed  = failedOptions.has(i);
    const rolling = rollingOptionIdx === i;
    const dimmed  = rollingOptionIdx !== null && !rolling;
    const cfg     = TYPE_CONFIG[opt.type] || TYPE_CONFIG.speak;
    const c       = cfg.color;

    const borderColor = failed ? '#2a1a1a' : '#2a2a2a';
    const bg          = failed ? '#0a0808' : '#0f0f0f';

    const opacity = (failed || dimmed) ? '0.35' : '1';
    const cursor  = (failed || dimmed) ? 'default' : 'pointer';

    const badgeLabel = failed ? 'failed' : cfg.badge;
    const badgeColor = failed ? '#8a2222' : c;
    const badge = `<span style="font-size:11px;color:${badgeColor};background:${badgeColor}18;border:1px solid ${badgeColor}35;padding:2px 8px;border-radius:3px;font-family:monospace;white-space:nowrap;">${badgeLabel}</span>`;

    const isAction = !opt.label.startsWith('"');
    const wrap = document.createElement('div');
    wrap.innerHTML = `
      <button data-idx="${i}" style="width:100%;display:flex;justify-content:space-between;align-items:center;border:1px solid ${borderColor};padding:10px 14px;background:${bg};border-radius:2px;opacity:${opacity};cursor:${cursor};text-align:left;font-size:13px;color:#aaa;gap:12px;">
        <span style="${isAction ? 'font-style:italic;' : ''}">${opt.label}</span>${badge}
      </button>`;

    container.appendChild(wrap);

    if (!failed && !dimmed) {
      wrap.querySelector('button').addEventListener('click', () => handleOption(d, key, i, opt));
    }
  });
}

function handleOption(d, key, i, opt) {
  if (opt.type === 'combat')      { renderCombat(); return; }
  if (opt.type === 'skill_check') { openSkillModal(d, key, i, opt); return; }
  if (opt.type === 'rest')        { renderStub('Rest', '#8b5cf6'); return; }
  if (opt.type === 'shop')        { renderStub('Shop', '#f59e0b'); return; }
  if (opt.type === 'loot')        { renderStub('Loot', '#10b981'); return; }
  if (opt.type === 'examine')     { renderStub('Examine Surroundings', '#84cc16'); return; }
  setTimeout(() => renderInteraction(opt.next), 80);
}

function openSkillModal(d, key, i, opt) {
  // Dim options while modal is open
  rollingOptionIdx = i;
  renderOptions(d, key);

  const modal = document.createElement('div');
  modal.id = 'skill-modal';
  modal.style.cssText = `
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.75);backdrop-filter:blur(3px);
    animation:fadeIn 0.2s ease forwards;`;

  modal.innerHTML = `
    <div style="background:#0e0e16;border:1px solid #6366f140;border-radius:12px;box-shadow:0 0 40px #6366f120;width:400px;height:340px;display:flex;flex-direction:column;padding:28px 36px;box-sizing:border-box;">

      <!-- Header: fixed height -->
      <div style="flex-shrink:0;text-align:center;margin-bottom:20px;">
        <div style="color:#555;font-size:10px;text-transform:uppercase;letter-spacing:2px;font-family:monospace;margin-bottom:4px;">${opt.skill.stat} check · DC ${opt.skill.dc}</div>
        <div style="color:#666;font-size:12px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">"${opt.label}"</div>
      </div>

      <!-- Die row: centered, result underneath -->
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:110px;margin-bottom:16px;">
        <div style="position:relative;width:64px;height:64px;display:flex;align-items:center;justify-content:center;">
          <div id="modal-die-face" style="position:absolute;inset:0;border:2px solid #c8963e44;border-radius:3px;transform:rotate(45deg);transition:border-color 0.4s,box-shadow 0.4s;"></div>
          <span id="modal-die-num" style="position:relative;z-index:1;font-size:16px;font-weight:700;color:#c8963e44;font-family:monospace;line-height:1;min-width:2ch;text-align:center;">d20</span>
        </div>
        <div style="height:28px;display:flex;align-items:center;margin-top:10px;">
          <div id="modal-roll-label" style="visibility:hidden;font-size:11px;text-transform:uppercase;letter-spacing:3px;font-family:monospace;"></div>
        </div>
      </div>

      <!-- Result text: fixed height -->
      <div style="flex:1;display:flex;align-items:center;">
        <div id="modal-result-text" style="visibility:hidden;font-size:12px;color:#aaa;font-style:italic;line-height:1.8;border-left:2px solid #333;padding-left:14px;"></div>
      </div>

      <!-- Action button: fixed height -->
      <div id="modal-action" style="flex-shrink:0;height:44px;display:flex;align-items:center;justify-content:center;"></div>
    </div>`;

  document.body.appendChild(modal);

  // Show roll button — don't auto-roll
  window.currentRollArgs = { d, key, i, opt };
  const action = document.getElementById('modal-action');
  action.innerHTML = `<button onclick="runSkillModal(currentRollArgs.d,currentRollArgs.key,currentRollArgs.i,currentRollArgs.opt)" style="background:#c8963e18;border:1px solid #c8963e60;color:#c8963e;padding:8px 28px;border-radius:4px;font-size:13px;font-family:monospace;cursor:pointer;letter-spacing:1px;animation:rollBtnPulse 1.2s ease-in-out infinite;">Roll</button>`;
  action.style.opacity = '1';
}

function runSkillModal(d, key, i, opt) {
  const action = document.getElementById('modal-action');
  action.style.opacity = '0';
  action.innerHTML = '';
  const face = document.getElementById('modal-die-face');
  face.style.borderColor = '#c8963e';
  face.className = 'die-glow';

  const roll    = Math.floor(Math.random() * 20) + 1;
  const success = roll >= opt.skill.dc;
  const num     = document.getElementById('modal-die-num');
  const lbl     = document.getElementById('modal-roll-label');
  const txt     = document.getElementById('modal-result-text');
  const FLICKER = 120;

  const steps = [...Array(12).fill(FLICKER)];
  let step = 0;

  num.style.fontSize = '28px';
  num.style.color    = '#c8963e';

  function tick() {
    if (step < steps.length) {
      num.textContent = Math.floor(Math.random()*20)+1;
      setTimeout(tick, steps[step++]);
    } else {
      num.textContent = roll;
      face.className  = 'die-settle';
      setTimeout(() => {
        const color = success ? '#4a9a5a' : '#8a2222';
        face.style.borderColor = color;
        face.style.boxShadow   = `0 0 18px 4px ${color}55`;
        face.className         = '';
        face.style.transform   = 'rotate(45deg)';
        num.style.color        = color;
        document.getElementById('modal-result-text').style.borderLeftColor = color;

        lbl.textContent   = success ? 'Success' : 'Failure';
        lbl.style.color   = color;
        lbl.style.visibility = 'visible';

        // Show result narration
        setTimeout(() => {
          txt.textContent = success
            ? 'You time it perfectly — a quick sidestep as the figure lunges, one foot finding solid ground at the ravine\'s edge. By the time they turn, you\'re already on the other side.'
            : opt.failText;
          txt.style.borderLeftColor = color;
          txt.style.visibility = 'visible';

          // Show action button
          setTimeout(() => {
            if (success) {
              action.innerHTML = `<button onclick="closeSkillModal(true)" style="background:#4a9a5a20;border:1px solid #4a9a5a50;color:#4a9a5a;padding:8px 24px;border-radius:4px;font-size:12px;font-family:monospace;cursor:pointer;letter-spacing:1px;">Continue →</button>`;
              action.style.opacity = '1';
              action._onContinue = () => { closeSkillModal(false); renderInteraction(opt.successNext); };
            } else {
              action.innerHTML = `<button onclick="closeSkillModal(false)" style="background:#1e1e1e;border:1px solid #333;color:#666;padding:8px 24px;border-radius:4px;font-size:12px;font-family:monospace;cursor:pointer;letter-spacing:1px;">Back</button>`;
              action.style.opacity = '1';
              action._onClose = () => {
                rollingOptionIdx = null;
                failedOptions.add(i);
                renderOptions(d, key);
              };
            }
          }, 400);
        }, 300);
      }, 350);
    }
  }
  tick();
}

function closeSkillModal(isContinue) {
  const modal  = document.getElementById('skill-modal');
  const action = document.getElementById('modal-action');
  if (isContinue && action._onContinue) { action._onContinue(); }
  else if (!isContinue && action._onClose) { action._onClose(); }
  if (modal) modal.remove();
}

function renderCombat() {
  document.getElementById('interaction-area').innerHTML = `
    <div class="fade-up" style="display:flex;flex-direction:column;gap:16px;">
      <div style="color:#ef4444;font-size:11px;text-transform:uppercase;letter-spacing:2px;font-family:monospace;">⚔ Combat initiated</div>
      <div style="background:#1a0a0a;border:1px solid #ef444430;border-radius:8px;padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:20px;">💀</span>
            <div><div style="color:white;font-size:13px;font-weight:600;">The Stranger</div><div style="color:#666;font-size:10px;">Aggressive</div></div>
          </div>
          <span style="color:#ef4444;font-size:12px;font-weight:700;">80 / 80 HP</span>
        </div>
        <div style="background:#2a2a2a;border-radius:3px;height:6px;"><div style="background:#ef4444;width:100%;height:100%;border-radius:3px;"></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;">
        <div style="background:#ef444420;border:1px solid #ef444440;border-radius:4px;padding:8px;color:#ef4444;text-align:center;cursor:pointer;">⚔ Attack</div>
        <div style="background:#6366f120;border:1px solid #6366f140;border-radius:4px;padding:8px;color:#6366f1;text-align:center;cursor:pointer;">✨ Spell</div>
        <div style="background:#f59e0b20;border:1px solid #f59e0b40;border-radius:4px;padding:8px;color:#f59e0b;text-align:center;cursor:pointer;">🧪 Use Item</div>
        <div style="background:#1e1e1e;border:1px solid #333;border-radius:4px;padding:8px;color:#888;text-align:center;cursor:pointer;">🛡 Defend</div>
      </div>
      <div style="font-size:11px;color:#555;font-style:italic;">Combat UI — full design coming next</div>
    </div>`;
}

function renderStub(label, color) {
  document.getElementById('interaction-area').innerHTML = `
    <div class="fade-up" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;text-align:center;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;font-family:monospace;color:${color};">${label}</div>
      <div style="color:#555;font-size:12px;font-style:italic;">${label} UI — coming next</div>
      <div onclick="renderInteraction('start')" style="margin-top:8px;background:#1e1e1e;border:1px solid #333;color:#666;padding:6px 16px;border-radius:4px;font-size:12px;cursor:pointer;">← Back</div>
    </div>`;
}

function renderEnd() {
  document.getElementById('interaction-area').innerHTML = `
    <div class="fade-up" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;gap:12px;text-align:center;">
